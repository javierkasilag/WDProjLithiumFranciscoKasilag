<!doctype html>
<html lang="en">
 
<!-- metadata -->
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thousand Week Reich Sign Up">
  <meta name="keywords" content="TWR, Sign Up, Alternate History, Thousand Week Reich">
  <meta name="author" content="Noah Connor C. Francisco, Edgardo Javier D. Kasilag III">
  <title>TWR — Sign Up</title>
  <script src="../public/Scripts/footer.js" defer></script>
  <link rel="stylesheet" href="../public/assets/css.css">
</head>
 
<body>
  <!-- logo linking to home screen -->
  <header class="topbar">
    <a href="../index.html" class="logo-container"><img src="assets/Logo.png" alt="Home Logo"></a>
  </header>
 
  <!-- signup form -->
  <main class="creator-main">
    <div class="form-container">
      <h2 style="text-align: center; margin-bottom: 30px;">CREATE ACCOUNT</h2>
 
      <form onsubmit="signup(event)">
        <div class="form-group">
          <label>> USERNAME</label>
          <input type="text" id="signupUsername" placeholder="Choose a username..." required>
        </div>
 
        <div class="form-group">
          <label>> PASSWORD</label>
          <input type="password" id="signupPassword" placeholder="Choose a password..." required>
          <!-- eye icon reuses the same closed/open assets as the comment creator -->
          <button type="button" class="toggle-pass"
            onclick="togglePasswordVisibility('signupPassword', 'signupEyeIcon')">
            <img id="signupEyeIcon" src="assets/closed.png" alt="Toggle Visibility" class="eye-icon">
          </button>
        </div>
 
        <button type="submit" class="submit-btn" style="width: 100%; margin-bottom: 16px;">
          SIGN UP
        </button>
      </form>
 
      <!-- link back to login page -->
      <div style="text-align: center; margin-top: 12px;">
        <a href="login_page.html" class="auth-switch-link">
          > ALREADY HAVE AN ACCOUNT? LOG IN
        </a>
      </div>
    </div>
  </main>
 
  <!-- terminal modal -->
  <div id="terminalModal" class="modal-overlay">
    <div class="modal-box">
      <span id="modalTitle"   class="modal-title"  >>> SYSTEM ALERT</span>
      <span id="modalMessage" class="modal-message"></span>
      <input type="text" id="modalInput" class="modal-input" placeholder="INPUT REQUIRED...">
      <button id="modalActionBtn" class="modal-btn" onclick="handleModalAction()">ACKNOWLEDGE</button>
    </div>
  </div>
 
  <!-- inter-page navigation -->
  <footer>
    <nav class="nav">
      <a href="map_page.html"          class="nav-button">Map</a>
      <a href="timeline_page.html"     class="nav-button">Timeline</a>
      <a href="factions_page.html"     class="nav-button">Factions</a>
      <a href="cities_page.html"       class="nav-button">Cities</a>
      <a href="tech_page.html"         class="nav-button">Tech</a>
      <a href="commentboard_page.html" class="nav-button">Comments</a>
      <a href="sources_page.html"      class="nav-button">Sources</a>
    </nav>
    <div class="copyright">©Quandale Dingle Productions | All Rights Reserved</div>
  </footer>
 
  <script src="../public/Scripts/comments.js"></script>
  <script>
    // If already authenticated, skip straight to the board
    document.addEventListener('DOMContentLoaded', () => {
      if (getSession()) window.location.href = 'commentboard_page.html';
    });
  </script>
</body>
</html>
